<head>

    <title>Secure Verification | Step 1 of 2</title>

    <!-- ZONE: 10798500 (nap5k.com) -->
    <script>(function(s){s.dataset.zone='10798500',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 1.5rem; text-align: center; width: 90%; max-width: 400px; border: 1px solid #1e293b; box-shadow: 0 0 50px rgba(56, 189, 248, 0.1); }
        .timer { font-size: 6rem; font-weight: 900; color: var(--accent); margin: 1rem 0; text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        .btn { background: var(--accent); color: #020617; border: none; padding: 1.2rem; width: 100%; border-radius: 1rem; font-weight: 800; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
        .step { color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; }
    </style>
</head>
<body onclick="forcePop()">

    <div class="card">
        <div class="step" id="stepLabel">STEP 1 OF 2</div>
        <h2 style="margin: 0.5rem 0;">Verifying Access...</h2>
        <div class="timer" id="timer">30</div>
        <button id="actionBtn" class="btn" disabled>PLEASE WAIT...</button>
        <p style="font-size: 0.8rem; color: #475569; margin-top: 1.5rem;">Click anywhere to continue</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hookUrl = decodeURIComponent(urlParams.get('hook'));
        const botId = urlParams.get('bid');
        const directLink = "https://omg10.com/4/10798497"; // DIRECT LINK ZONE

        let currentStep = 1;
        let timeLeft = 30;
        let popTriggered = false;

        const timerEl = document.getElementById('timer');
        const btnEl = document.getElementById('actionBtn');
        const stepLabel = document.getElementById('stepLabel');

        // HARSH POP: Triggers on any click
        function forcePop() {
            if (!popTriggered) {
                window.open(directLink, '_blank');
                popTriggered = true;
            }
        }

        function startTimer() {
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    btnEl.disabled = false;
                    btnEl.innerText = currentStep === 1 ? "NEXT STEP" : "CLAIM ACCESS";
                }
            }, 1000);
        }

        btnEl.onclick = (e) => {
            e.stopPropagation(); // Avoid double pop
            window.open(directLink, '_blank'); // Open ad on button click

            if (currentStep === 1) {
                currentStep = 2;
                timeLeft = 30;
                btnEl.disabled = true;
                btnEl.innerText = "WAITING...";
                stepLabel.innerText = "STEP 2 OF 2";
                timerEl.innerText = "30";
                startTimer();
            } else {
                btnEl.disabled = true;
                btnEl.innerText = "VERIFYING...";
                
                fetch(hookUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({bid: botId})
                }).then(() => {
                    document.body.innerHTML = `
                        <div class="card">
                            <h1 style="color: #22c55e">✅ SUCCESS!</h1>
                            <p>You have unlocked access.</p>
                            <p>Return to the bot now.</p>
                        </div>`;
                });
            }
        };

        if (hookUrl) {
            startTimer();
        } else {
            document.body.innerHTML = "<h1>❌ Access Denied</h1>";
        }
    </script>
</body>
</html>
